cv:
  name: Jiadong Yu
  label: Assistant Professor, Internet of Things (IoT) Thrust and Artificial Intelligence (AI) Thrust, HKUST(GZ)
  email: jiadongyu@hkust-gz.edu.cn
  location: Guangzhou, China
  image: ""
  summary: Assistant Professor in Internet of Things (IoT) Thrust, with a joint appointment in Artificial Intelligence (AI) Thrust, Information Hub, The Hong Kong University of Science and Technology (Guangzhou), working on reinforcement learning, multi-agent systems, edge intelligence, wireless communications, digital twins, and cyber-physical systems.

  address:
